<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>requestAnimationFrame Example</title>

<style>
    #box {
        width: 60px;
        height: 60px;
        background-color: red;
        position: absolute;
        left: 0;
        top: 100px;
    }
</style>
</head>

<body>

<div id="box"></div>

<script>

const box = document.getElementById("box");

let position = 0;

function moveBox() {

    // حرك المربع بمقدار 2 بكسل
    position += 2;

    // غيّر مكانه
    box.style.left = position + "px";

    // إذا وصل إلى نهاية الصفحة توقف
    if (position < 500) {
        requestAnimationFrame(moveBox);
    }

}

// ابدأ الحركة
requestAnimationFrame(moveBox);

</script>

</body>
</html>
